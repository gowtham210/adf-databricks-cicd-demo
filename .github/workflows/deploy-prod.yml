name: Deploy PROD

on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure Login
        run: |
          az account show

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          python -m pip install --upgrade pip
          pip install databricks-cli

      - name: Configure Databricks CLI
        run: |
          echo "Testing Databricks Connection..."
          databricks workspace ls /

      - name: Create Workspace Folder
        run: |
          databricks workspace mkdirs /Shared/CICD

      - name: Deploy Notebook to PROD
        run: |
          databricks workspace import \
          databricks/NB_LoadEmployee.ipynb \
          /Shared/CICD/NB_LoadEmployee \
          --format JUPYTER \
          --language PYTHON \
          --overwrite

      - name: Verify Deployment
        run: |
          echo "Notebook deployed successfully."
          databricks workspace ls /Shared/CICD

      - name: Verify Databricks Host
        run: |
          echo "Host:"
          echo "$DATABRICKS_HOST"

      - name: Create or Update Databricks Job
        run: |
          echo "Checking if Employee_ETL_Job exists..."

          JOB_ID=$(curl -s \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
            "${DATABRICKS_HOST}/api/2.1/jobs/list" | \
            python3 -c "import sys,json; jobs=json.load(sys.stdin).get('jobs',[]); print(next((str(j['job_id']) for j in jobs if j['settings']['name']=='Employee_ETL_Job'),''))")

          echo "Found Job ID: $JOB_ID"

          if [ -z "$JOB_ID" ]; then
            echo "Job not found. Creating..."

            curl -X POST \
              "${DATABRICKS_HOST}/api/2.1/jobs/create" \
              -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data @jobs/employee-job.json

          else
            echo "Job exists. Updating..."

            printf '{"job_id": %s, "new_settings": ' "$JOB_ID" > reset.json
            cat jobs/employee-job.json >> reset.json
            echo "}" >> reset.json

            cat reset.json

            curl -X POST \
              "${DATABRICKS_HOST}/api/2.1/jobs/reset" \
              -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data @reset.json
          fi

      - name: Verify Job
        run: |
          curl -X GET \
            "${DATABRICKS_HOST}/api/2.1/jobs/list" \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
            -H "Content-Type: application/json"
